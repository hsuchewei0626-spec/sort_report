<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>排序演示 - 算法可視化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 48px 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      text-align: center;
    }
    h1 {
      font-size: 36px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }
    a {
      display: block;
      padding: 14px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
    }
    a:active {
      transform: translateY(0);
    }
    .note {
      font-size: 12px;
      color: #999;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>排序演示</h1>
    <p class="subtitle">探索算法可視化</p>
    <div class="links">
      <a href="bubble-sort.html" target="_blank" rel="noopener">🫧 氣泡排序（Bubble Sort）</a>
      <a href="selection_sort.html" target="_blank" rel="noopener">✋ 選擇排序（Selection Sort）</a>
      <a href="insertion_sort.html" target="_blank" rel="noopener">📥 插入排序（Insertion Sort）</a>
      <a href="merge_sort.html" target="_blank" rel="noopener">🔀 合併排序（Merge Sort）</a>
      <a href="quick_sort.html" target="_blank" rel="noopener">⚡ 快速排序（Quick Sort）</a>
    </div>
    <p class="note">點擊上面的連結在新標籤頁中開啟各個排序演示</p>
  </div>
</body>
</html>
