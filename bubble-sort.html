<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>氣泡排序法 Bubble Sort 示範</title>
  <style>
    body{font-family:Segoe UI,Roboto,Arial;display:flex;flex-direction:column;align-items:center;margin:20px}
    h1{font-size:20px;margin-bottom:6px}
    .controls{display:flex;gap:8px;align-items:center;margin-bottom:12px}
    input[type=range]{width:140px}
    #canvas{width:800px;height:320px;border:1px solid #ddd;padding:10px;display:flex;align-items:end;gap:4px;background:#fafafa}
    .bar{background:#4aa3df;width:24px;border-radius:3px;display:flex;align-items:end;justify-content:center;color:#fff;font-size:11px}
    .bar.swap{background:#ef6c6c}
    .bar.compare{background:#f0a202}
    .small{font-size:13px;color:#666}
    footer{margin-top:12px;color:#666;font-size:13px}
    button,select,input[type=number]{padding:6px 8px;border-radius:4px;border:1px solid #ccc;background:white}
  </style>
</head>
<body>
  <h1>氣泡排序法（Bubble Sort）示範</h1>
  <div class="controls">
    <label class="small">大小:</label>
    <input id="size" type="number" min="5" max="50" value="20" style="width:64px" />
    <label class="small">速度:</label>
    <input id="speed" type="range" min="10" max="1000" value="200" />
    <button id="random">隨機產生</button>
    <button id="start">開始</button>
    <button id="pause">暫停</button>
    <button id="step">單步</button>
  </div>

  <div id="canvas" aria-live="polite"></div>
  <footer>說明：黃色 = 比較，紅色 = 交換。可調整速度與大小，按「單步」可執行一個交換或比較步驟。</footer>

  <script>
    const canvas = document.getElementById('canvas');
    const sizeInput = document.getElementById('size');
    const speedInput = document.getElementById('speed');
    const randomBtn = document.getElementById('random');
    const startBtn = document.getElementById('start');
    const pauseBtn = document.getElementById('pause');
    const stepBtn = document.getElementById('step');

    let arr = [];
    let bars = [];
    let running = false;
    let paused = false;
    let delay = ms => new Promise(r=>setTimeout(r,ms));

    function createArray(n){
      arr = Array.from({length:n},()=>Math.floor(Math.random()*100)+5);
      render();
    }

    function clearCanvas(){
      canvas.innerHTML='';
      bars = [];
    }

    function render(){
      clearCanvas();
      const max = Math.max(...arr);
      const width = Math.min(24, Math.floor((canvas.clientWidth - (arr.length-1)*4)/arr.length));
      arr.forEach((v,i)=>{
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.height = Math.max(8, Math.round((v/max)*(canvas.clientHeight-20)))+'px';
        bar.style.width = width+'px';
        bar.textContent = v;
        canvas.appendChild(bar);
        bars.push(bar);
      })
    }

    function mark(i,cls){
      if(bars[i]) bars[i].classList.add(cls);
    }
    function unmark(i,cls){ if(bars[i]) bars[i].classList.remove(cls); }

    async function bubbleSort(){
      running = true;
      paused = false;
      const n = arr.length;
      for(let i=0;i<n-1;i++){
        let swapped = false;
        for(let j=0;j<n-1-i;j++){
          if(!running) return; // stopped externally
          // compare
          mark(j,'compare');
          mark(j+1,'compare');
          await delay(Number(speedInput.value));
          if(paused){ await waitWhilePaused(); }

          if(arr[j] > arr[j+1]){
            // swap
            mark(j,'swap');
            mark(j+1,'swap');
            await delay(Number(speedInput.value));
            swap(j,j+1);
            swapped = true;
            await delay(Number(speedInput.value));
            unmark(j,'swap');
            unmark(j+1,'swap');
          }
          unmark(j,'compare');
          unmark(j+1,'compare');
          if(paused){ await waitWhilePaused(); }
        }
        if(!swapped) break;
      }
      running = false;
    }

    function swap(i,j){
      const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
      // update bars heights and labels
      const max = Math.max(...arr);
      bars[i].style.height = Math.max(8, Math.round((arr[i]/max)*(canvas.clientHeight-20)))+'px';
      bars[j].style.height = Math.max(8, Math.round((arr[j]/max)*(canvas.clientHeight-20)))+'px';
      bars[i].textContent = arr[i];
      bars[j].textContent = arr[j];
    }

    function stopRun(){ running = false; }

    function waitWhilePaused(){
      return new Promise(resolve=>{
        const check = ()=>{ if(!paused) resolve(); else setTimeout(check,50); };
        check();
      })
    }

    // single-step bubble: perform next comparison/swap manually
    let stepState = {i:0,j:0,phase:'compare'};
    function resetStepState(){ stepState={i:0,j:0,phase:'compare'}; }
    function stepOnce(){
      const n=arr.length;
      if(stepState.i >= n-1) return;
      const i = stepState.i, j = stepState.j;
      // clear previous marks
      unmark(j,'compare'); unmark(j+1,'compare'); unmark(j,'swap'); unmark(j+1,'swap');
      // compare
      mark(j,'compare'); mark(j+1,'compare');
      if(arr[j] > arr[j+1]){
        mark(j,'swap'); mark(j+1,'swap');
        swap(j,j+1);
        unmark(j,'swap'); unmark(j+1,'swap');
      }
      unmark(j,'compare'); unmark(j+1,'compare');
      stepState.j++;
      if(stepState.j >= n-1-stepState.i){ stepState.i++; stepState.j=0; }
    }

    // UI bindings
    randomBtn.addEventListener('click',()=>{ createArray(Number(sizeInput.value)); resetStepState(); });
    startBtn.addEventListener('click',()=>{ if(!running) bubbleSort(); else { paused=false; } });
    pauseBtn.addEventListener('click',()=>{ paused = true; });
    stepBtn.addEventListener('click',()=>{ if(running) { paused=true; } stepOnce(); });

    // initialize
    createArray(Number(sizeInput.value));

    // expose for debugging
    window.__bubble = {arr,bars,render,createArray};
  </script>
</body>
</html>
